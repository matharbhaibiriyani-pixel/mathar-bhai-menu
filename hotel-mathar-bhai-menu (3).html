<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Hotel Mathar Bhai — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Karla:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #241A14;
    --ink-soft: #362820;
    --ember: #B23A2E;
    --ember-dark: #8E2E24;
    --saffron: #E3A83B;
    --curry: #4F5D3A;
    --cream: #EFE3C8;
    --cream-dim: #E5D6B4;
    --clay: #7A4B32;
    --paper: #FBF6E9;

    --font-display: 'Fraunces', serif;
    --font-body: 'Karla', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--ink);
    color: var(--cream);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--ink);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Header / hero ---------- */

  .hero {
    padding: 2.75rem 1.5rem 2rem;
    text-align: center;
    background:
      radial-gradient(ellipse at top, rgba(227,168,59,0.10), transparent 60%),
      var(--ink);
    border-bottom: 1px solid var(--clay);
    position: relative;
  }

  .hero__name {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(2.1rem, 9vw, 2.6rem);
    line-height: 1.05;
    margin: 0;
    color: var(--paper);
    letter-spacing: -0.01em;
  }

  .hero__rule {
    width: 56px;
    height: 3px;
    background: var(--ember);
    margin: 1.1rem auto 0.9rem;
    border-radius: 2px;
  }

  /* ---------- Menu list ---------- */


  .menu-body {
    flex: 1;
    padding: 1.5rem 1.25rem 6.5rem;
  }

  .category-label {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--curry-bright, #7C9463);
    margin: 0 0 0.9rem 0.1rem;
  }

  .item-card {
    background: var(--paper);
    color: var(--ink);
    border-radius: 14px;
    padding: 1.1rem 1.15rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform 0.15s ease, border-color 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .item-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--ember);
  }

  .item-card:active {
    transform: scale(0.985);
  }

  .item-card:focus-visible {
    outline: 3px solid var(--saffron);
    outline-offset: 2px;
  }

  .item-card__text { flex: 1; min-width: 0; }

  .item-card__name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.18rem;
    margin: 0 0 0.2rem;
    color: var(--ink);
  }

  .item-card__desc {
    font-size: 0.83rem;
    color: var(--clay);
    margin: 0;
    line-height: 1.4;
  }

  .price-stamp {
    flex-shrink: 0;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 2px solid var(--ember);
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-6deg);
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--ember-dark);
    font-size: 0.78rem;
    text-align: center;
    line-height: 1.1;
    background: rgba(178,58,46,0.05);
  }

  .price-stamp--lg {
    width: 92px;
    height: 92px;
    font-size: 1.05rem;
    border-width: 3px;
  }

  /* ---------- Dish detail ---------- */

  .detail-body {
    flex: 1;
    padding: 1.25rem 1.5rem 7rem;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--cream-dim);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    padding: 0.5rem 0;
    margin-bottom: 0.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .back-btn:hover { color: var(--saffron); }

  .detail-card {
    background: var(--paper);
    color: var(--ink);
    border-radius: 18px;
    padding: 2rem 1.5rem 1.75rem;
    text-align: center;
    margin-top: 0.5rem;
  }

  .detail-card__name {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 1.9rem;
    margin: 0.75rem 0 0.4rem;
    color: var(--ink);
  }

  .detail-card__desc {
    font-size: 0.92rem;
    color: var(--clay);
    max-width: 34ch;
    margin: 0 auto 1.5rem;
    line-height: 1.55;
  }

  .detail-card__desc--empty {
    font-style: italic;
    opacity: 0.65;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  .view { display: none; }
  .view.visible { display: block; }
</style>
</head>
<body>

<div id="app">

  <!-- MENU VIEW -->
  <div class="view visible" id="view-menu">
    <div class="hero">
      <h1 class="hero__name">Hotel Mathar Bhai</h1>
      <div class="hero__rule"></div>
    </div>
    <div class="menu-body">
      <div id="menu-list"></div>
    </div>
  </div>

  <!-- DISH DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="detail-body">
      <button class="back-btn" onclick="showView('menu')">&larr; Back to menu</button>
      <div class="detail-card" id="detail-card"></div>
    </div>
  </div>

</div>

<script>
  // ---------- Menu data ----------
  const CATEGORIES = [
    "பிரியாணி",
    "சைனீஸ்",
    "புரோட்டா",
    "சப்பாத்தி",
    "இடியாப்பம்",
    "பீஃப்",
    "சிக்கன்",
    "குடல் & சூப்",
    "முட்டை"
  ];

  const MENU = [
    // பிரியாணி
    { id: "chicken-biriyani", category: "பிரியாணி", name: "சிக்கன் பிரியாணி", price: 130, description: "" },
    { id: "beef-biriyani", category: "பிரியாணி", name: "பீஃப் பிரியாணி", price: 150, description: "" },
    { id: "empty-biriyani", category: "பிரியாணி", name: "MT பிரியாணி", price: 110, description: "" },

    // சைனீஸ்
    { id: "chicken-fried-rice", category: "சைனீஸ்", name: "சிக்கன் ஃப்ரைடு ரைஸ்", price: 130, description: "" },
    { id: "egg-fried-rice", category: "சைனீஸ்", name: "Egg ஃப்ரைடு ரைஸ்", price: 110, description: "" },
    { id: "veg-fried-rice", category: "சைனீஸ்", name: "Veg ஃப்ரைடு ரைஸ்", price: 110, description: "" },
    { id: "beef-fried-rice", category: "சைனீஸ்", name: "பீஃப் ஃப்ரைடு ரைஸ்", price: 150, description: "" },
    { id: "chicken-noodles", category: "சைனீஸ்", name: "சிக்கன் நூடுல்ஸ்", price: 130, description: "" },
    { id: "beef-noodles", category: "சைனீஸ்", name: "பீஃப் நூடுல்ஸ்", price: 150, description: "" },
    { id: "egg-noodles", category: "சைனீஸ்", name: "Egg நூடுல்ஸ்", price: 110, description: "" },
    { id: "veg-noodles", category: "சைனீஸ்", name: "Veg நூடுல்ஸ்", price: 110, description: "" },

    // புரோட்டா
    { id: "porotta", category: "புரோட்டா", name: "புரோட்டா", price: 15, description: "" },
    { id: "egg-kothu-porotta", category: "புரோட்டா", name: "Egg கொத்து புரோட்டா", price: 120, description: "" },
    { id: "chicken-kothu-porotta", category: "புரோட்டா", name: "சிக்கன் கொத்து புரோட்டா", price: 160, description: "" },
    { id: "beef-kothu-porotta", category: "புரோட்டா", name: "பீஃப் கொத்து புரோட்டா", price: 160, description: "" },

    // சப்பாத்தி
    { id: "chapati", category: "சப்பாத்தி", name: "சப்பாத்தி", price: 15, description: "" },
    { id: "egg-kothu-chapati", category: "சப்பாத்தி", name: "Egg கொத்து சப்பாத்தி", price: 120, description: "" },
    { id: "chicken-kothu-chapati", category: "சப்பாத்தி", name: "சிக்கன் கொத்து சப்பாத்தி", price: 160, description: "" },
    { id: "beef-kothu-chapati", category: "சப்பாத்தி", name: "பீஃப் கொத்து சப்பாத்தி", price: 160, description: "" },

    // இடியாப்பம்
    { id: "idiyappam", category: "இடியாப்பம்", name: "இடியாப்பம்", price: 15, description: "" },
    { id: "egg-kothu-idiyappam", category: "இடியாப்பம்", name: "Egg கொத்து இடியாப்பம்", price: 130, description: "" },
    { id: "chicken-kothu-idiyappam", category: "இடியாப்பம்", name: "சிக்கன் கொத்து இடியாப்பம்", price: 170, description: "" },

    // பீஃப்
    { id: "beef-pakora", category: "பீஃப்", name: "பீஃப் பக்கோடா (100g)", price: 90, description: "" },
    { id: "beef-roast", category: "பீஃப்", name: "பீஃப் ரோஸ்ட்", price: 120, description: "" },
    { id: "beef-gravy", category: "பீஃப்", name: "பீஃப் கிரேவி", price: 150, description: "" },
    { id: "beef-pepper-roast", category: "பீஃப்", name: "பீஃப் Pepper ரோஸ்ட்", price: 140, description: "" },
    { id: "beef-pepper-gravy", category: "பீஃப்", name: "பீஃப் Pepper கிரேவி", price: 170, description: "" },

    // சிக்கன்
    { id: "chicken-65", category: "சிக்கன்", name: "சிக்கன் 65 (100g)", price: 80, description: "" },
    { id: "chicken-chilli-gravy", category: "சிக்கன்", name: "சிக்கன் சில்லி கிரேவி", price: 110, description: "" },
    { id: "chilli-chicken", category: "சிக்கன்", name: "சில்லி சிக்கன்", price: 140, description: "" },
    { id: "pepper-chicken", category: "சிக்கன்", name: "Pepper சிக்கன்", price: 140, description: "" },

    // குடல் & சூப்
    { id: "kudal-fry", category: "குடல் & சூப்", name: "குடல் ஃப்ரை", price: 80, description: "" },
    { id: "mattu-vaal-soup", category: "குடல் & சூப்", name: "மாட்டு வால் சூப்", price: 20, description: "" },

    // முட்டை
    { id: "omelette", category: "முட்டை", name: "ஆம்லெட்", price: 20, description: "" },
    { id: "full-boil", category: "முட்டை", name: "ஃபுல் பாயில்", price: 15, description: "" },
    { id: "half-boil", category: "முட்டை", name: "ஆஃப் பாயில்", price: 15, description: "" },
    { id: "kalakki", category: "முட்டை", name: "கலக்கி", price: 20, description: "" },
    { id: "mutta-poriyal", category: "முட்டை", name: "முட்டை பொரியல்", price: 30, description: "" }
  ];

  // currency formatting — rupees
  function formatPrice(n) {
    return "\u20B9" + n;
  }

  // ---------- State ----------
  let currentDetailId = null;

  // ---------- Rendering ----------
  function renderMenuList() {
    const container = document.getElementById("menu-list");
    container.innerHTML = "";

    CATEGORIES.forEach(category => {
      const items = MENU.filter(i => i.category === category);
      if (items.length === 0) return;

      const heading = document.createElement("p");
      heading.className = "category-label";
      heading.textContent = category;
      if (category !== CATEGORIES[0]) heading.style.marginTop = "1.75rem";
      container.appendChild(heading);

      const group = document.createElement("div");
      group.style.display = "flex";
      group.style.flexDirection = "column";
      group.style.gap = "0.65rem";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "item-card";
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.onclick = () => openDetail(item.id);
        card.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") openDetail(item.id); };
        card.innerHTML = `
          <div class="item-card__text">
            <p class="item-card__name">${item.name}</p>
            ${item.description ? `<p class="item-card__desc">${item.description}</p>` : ""}
          </div>
          <div class="price-stamp">${formatPrice(item.price)}</div>
        `;
        group.appendChild(card);
      });

      container.appendChild(group);
    });
  }

  function openDetail(itemId) {
    currentDetailId = itemId;
    renderDetail();
    showView("detail");
  }

  function renderDetail() {
    const item = MENU.find(i => i.id === currentDetailId);
    if (!item) return;
    const card = document.getElementById("detail-card");
    card.innerHTML = `
      <div class="price-stamp price-stamp--lg" style="margin: 0 auto;">${formatPrice(item.price)}</div>
      <h2 class="detail-card__name">${item.name}</h2>
      <p class="detail-card__desc ${item.description ? "" : "detail-card__desc--empty"}">
        ${item.description || "No description added yet."}
      </p>
    `;
  }

  // ---------- View switching ----------
  function showView(name) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("visible"));
    document.getElementById("view-" + name).classList.add("visible");
    window.scrollTo(0, 0);
  }

  // ---------- Init ----------
  renderMenuList();
</script>

</body>
</html>
